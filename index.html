<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Power Analysis - Radar Chart</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  body {
    margin: 0;
    padding: 20px;
    background: #f5f5f5;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
  .container {
    background: white;
    border-radius: 12px;
    padding: 30px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    max-width: 750px;
    width: 100%;
  }
  h1 {
    text-align: center;
    font-size: 18px;
    color: #333;
    margin-bottom: 5px;
  }
  .subtitle {
    text-align: center;
    font-size: 13px;
    color: #777;
    margin-bottom: 20px;
  }
  .chart-wrapper {
    position: relative;
    width: 100%;
    max-width: 650px;
    margin: 0 auto;
  }
</style>
</head>
<body>
<div class="container">
  <h1>Stakeholder Power Analysis</h1>
  <p class="subtitle">Key Actors in Japan's AI Surveillance Governance System</p>
  <div class="chart-wrapper">
    <canvas id="radarChart"></canvas>
  </div>
</div>

<script>
const ctx = document.getElementById('radarChart').getContext('2d');

const data = {
  labels: ['Power Over', 'Power to Initiate', 'Soft Power', 'Power With', 'Power to Resist', 'Hard Power'],
  datasets: [
    {
      label: 'National Diet',
      data: [9, 9, 5, 6, 7, 9],
      borderColor: '#E03C31',
      backgroundColor: 'transparent',
      borderWidth: 3,
      pointRadius: 3,
      pointBackgroundColor: '#E03C31',
      pointBorderColor: '#E03C31',
      pointBorderWidth: 1,
      pointHoverRadius: 6,
      pointHoverBackgroundColor: '#E03C31',
      pointHoverBorderColor: '#fff',
      pointHoverBorderWidth: 2
    },
    {
      label: 'NPA',
      data: [7, 5, 6, 7, 9, 8],
      borderColor: '#2196F3',
      backgroundColor: 'transparent',
      borderWidth: 3,
      pointRadius: 3,
      pointBackgroundColor: '#2196F3',
      pointBorderColor: '#2196F3',
      pointBorderWidth: 1,
      pointHoverRadius: 6,
      pointHoverBackgroundColor: '#2196F3',
      pointHoverBorderColor: '#fff',
      pointHoverBorderWidth: 2
    },
    {
      label: 'NPSC',
      data: [4, 4, 3, 5, 3, 2],
      borderColor: '#4CAF50',
      backgroundColor: 'transparent',
      borderWidth: 3,
      pointRadius: 3,
      pointBackgroundColor: '#4CAF50',
      pointBorderColor: '#4CAF50',
      pointBorderWidth: 1,
      pointHoverRadius: 6,
      pointHoverBackgroundColor: '#4CAF50',
      pointHoverBorderColor: '#fff',
      pointHoverBorderWidth: 2
    },
    {
      label: 'LDP Coalition',
      data: [8, 8, 7, 8, 9, 7],
      borderColor: '#FF9800',
      backgroundColor: 'transparent',
      borderWidth: 3,
      pointRadius: 3,
      pointBackgroundColor: '#FF9800',
      pointBorderColor: '#FF9800',
      pointBorderWidth: 1,
      pointHoverRadius: 6,
      pointHoverBackgroundColor: '#FF9800',
      pointHoverBorderColor: '#fff',
      pointHoverBorderWidth: 2
    }
  ]
};

const config = {
  type: 'radar',
  data: data,
  options: {
    responsive: true,
    maintainAspectRatio: true,
    scales: {
      r: {
        beginAtZero: true,
        min: 0,
        max: 10,
        ticks: {
          stepSize: 1,
          font: {
            size: 11
          },
          color: '#999',
          backdropColor: 'transparent'
        },
        grid: {
          color: 'rgba(0, 0, 0, 0.1)',
          lineWidth: 1
        },
        angleLines: {
          color: 'rgba(0, 0, 0, 0.15)',
          lineWidth: 1
        },
        pointLabels: {
          font: {
            size: 14,
            weight: 'bold'
          },
          color: '#333',
          padding: 15
        }
      }
    },
    plugins: {
      legend: {
        position: 'bottom',
        labels: {
          font: {
            size: 14,
            weight: '600'
          },
          color: '#333',
          padding: 25,
          usePointStyle: false,
          boxWidth: 50,
          boxHeight: 5
        }
      },
      tooltip: {
        backgroundColor: 'rgba(0,0,0,0.8)',
        titleFont: { size: 13 },
        bodyFont: { size: 12 },
        padding: 10,
        cornerRadius: 6
      }
    },
    elements: {
      line: {
        tension: 0
      }
    }
  }
};

new Chart(ctx, config);
</script>
</body>
</html>
